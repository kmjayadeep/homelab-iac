---
openclaw_user: "openclaw"
openclaw_group: "openclaw"

openclaw_authorized_keys:
  - "{{ lookup('file', ansible_ssh_private_key_file + '.pub') }}"

openclaw_git_user_name: "OpenClaw"
openclaw_git_user_email: "{{ lookup('env', 'OPENCLAW_EMAIL') | default('openclaw@localhost', true) }}"

openclaw_install_url: "https://openclaw.ai/install.sh"
openclaw_install_args: "--no-prompt --no-onboard --verify"
openclaw_install_command: "curl -fsSL --proto '=https' --tlsv1.2 {{ openclaw_install_url }} | bash -s -- {{ openclaw_install_args }}"
openclaw_bin: "/home/{{ openclaw_user }}/.npm-global/bin/openclaw"

openclaw_domain: "openclaw.cosmos.cboxlab.com"
openclaw_cert_domain: "{{ openclaw_domain }}"
openclaw_gateway_host: "127.0.0.1"
openclaw_gateway_port: 18789
openclaw_gateway_url: "http://{{ openclaw_gateway_host }}:{{ openclaw_gateway_port }}"

cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
letsencrypt_email: "{{ lookup('env', 'OPENCLAW_CERTBOT_EMAIL') | default(lookup('env', 'OPENCLAW_EMAIL') | default('admin@cboxlab.com', true), true) }}"

# Restic backup configuration. Repository credentials should come from the
# environment or vault and must not be committed in plain text.
backup_enabled: true
backup_schedule: hourly
backup_retention:
  keep_last: 10
  keep_daily: 10
  keep_monthly: 12
backup_paths:
  - "/home/{{ openclaw_user }}/.openclaw"

restic_repository: "{{ lookup('env', 'OPENCLAW_RESTIC_REPOSITORY') | default('s3:https://minio.cosmos.cboxlab.com/openclaw-backup', true) }}"
restic_password: "{{ lookup('env', 'OPENCLAW_RESTIC_PASSWORD') }}"
restic_s3_access_key: "{{ lookup('env', 'OPENCLAW_RESTIC_S3_ACCESS_KEY') }}"
restic_s3_secret_key: "{{ lookup('env', 'OPENCLAW_RESTIC_S3_SECRET_KEY') }}"
uptimekuma_url: "{{ lookup('env', 'UPTIMEKUMA_URL') | default('', true) }}"
