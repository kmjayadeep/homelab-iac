---
nanoclaw_user: "nanoclaw"
nanoclaw_group: "nanoclaw"

nanoclaw_authorized_keys:
  - "{{ lookup('file', ansible_ssh_private_key_file + '.pub') }}"

nanoclaw_git_user_name: "NanoClaw"
nanoclaw_git_user_email: "{{ lookup('env', 'NANOCLAW_EMAIL') | default('nanoclaw@localhost', true) }}"

nanoclaw_repo_url: "https://github.com/nanocoai/nanoclaw.git"
nanoclaw_checkout_dir: "/home/{{ nanoclaw_user }}/nanoclaw-v2"
nanoclaw_install_command: "bash nanoclaw.sh"

# NanoClaw's installer can install Docker if missing. Creating the group up
# front lets the NanoClaw user be ready for Docker-managed containers.
nanoclaw_create_docker_group: true
