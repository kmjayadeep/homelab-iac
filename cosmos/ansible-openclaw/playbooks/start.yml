---
- name: OpenClaw start notice
  hosts: openclaw_servers
  tasks:
    - name: Show manual OpenClaw start guidance
      ansible.builtin.debug:
        msg:
          - "OpenClaw is installed and managed by its own CLI/tooling, not an Ansible-managed service."
          - "SSH to the VM as {{ openclaw_user }} and run {{ openclaw_bin }} --help for available commands."
