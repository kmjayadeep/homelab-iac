---
- name: NanoClaw start notice
  hosts: nanoclaw_servers
  tasks:
    - name: Show manual NanoClaw start guidance
      ansible.builtin.debug:
        msg:
          - "NanoClaw is installed and managed by its own quickstart tooling, not an Ansible OpenClaw service."
          - "SSH to the VM as {{ nanoclaw_user }} and use the commands created by nanoclaw.sh."
