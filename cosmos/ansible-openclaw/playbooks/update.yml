---
- name: Update NanoClaw checkout
  hosts: nanoclaw_servers
  tasks:
    - name: Check for NanoClaw checkout
      ansible.builtin.stat:
        path: "{{ nanoclaw_checkout_dir }}/.git"
      register: nanoclaw_checkout

    - name: Pull latest NanoClaw repo changes
      ansible.builtin.git:
        repo: "{{ nanoclaw_repo_url }}"
        dest: "{{ nanoclaw_checkout_dir }}"
        update: true
      become_user: "{{ nanoclaw_user }}"
      when: nanoclaw_checkout.stat.exists

    - name: Show manual update guidance
      ansible.builtin.debug:
        msg:
          - "NanoClaw repo updated if it already existed."
          - "Run any NanoClaw installer or migration steps manually as {{ nanoclaw_user }}:"
          - "cd {{ nanoclaw_checkout_dir }}"
          - "{{ nanoclaw_install_command }}"
