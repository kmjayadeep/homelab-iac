---
- name: Update OpenClaw install
  hosts: openclaw_servers
  tasks:
    - name: Check for OpenClaw binary
      ansible.builtin.stat:
        path: "{{ openclaw_bin }}"
      register: openclaw_binary

    - name: Update OpenClaw with its built-in updater
      ansible.builtin.command: "{{ openclaw_bin }} update"
      become_user: "{{ openclaw_user }}"
      environment:
        HOME: "/home/{{ openclaw_user }}"
        OPENCLAW_NO_PROMPT: "1"
        PATH: "/home/{{ openclaw_user }}/.local/bin:/home/{{ openclaw_user }}/.npm-global/bin:{{ ansible_facts['env']['PATH'] }}"
      when: openclaw_binary.stat.exists

    - name: Install OpenClaw if missing
      when: not openclaw_binary.stat.exists
      block:
        - name: Allow OpenClaw installer to install system dependencies
          ansible.builtin.copy:
            dest: "/etc/sudoers.d/{{ openclaw_user }}-installer"
            content: "{{ openclaw_user }} ALL=(ALL) NOPASSWD:ALL\n"
            owner: root
            group: root
            mode: "0440"
            validate: "visudo -cf %s"

        - name: Run OpenClaw installer
          ansible.builtin.shell: "{{ openclaw_install_command }}"
          args:
            executable: /bin/bash
          become_user: "{{ openclaw_user }}"
          environment:
            HOME: "/home/{{ openclaw_user }}"
            OPENCLAW_NO_PROMPT: "1"
            OPENCLAW_NO_ONBOARD: "1"
            PATH: "/home/{{ openclaw_user }}/.local/bin:/home/{{ openclaw_user }}/.npm-global/bin:{{ ansible_facts['env']['PATH'] }}"
      always:
        - name: Remove temporary OpenClaw installer sudo access
          ansible.builtin.file:
            path: "/etc/sudoers.d/{{ openclaw_user }}-installer"
            state: absent
