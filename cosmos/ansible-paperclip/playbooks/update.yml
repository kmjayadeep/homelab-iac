---
- name: Update Paperclip
  hosts: paperclip_servers
  tasks:
    - name: Get npm global root
      ansible.builtin.command: npm root -g
      register: paperclip_npm_root
      changed_when: false

    - name: Update Paperclip via npm
      block:
        - name: Update Paperclip via npm
          community.general.npm:
            name: "{{ paperclip_npm_name }}"
            version: "{{ paperclip_npm_version }}"
            global: true
            state: latest
          environment: "{{ paperclip_npm_env }}"

        - name: Update Codex via npm
          community.general.npm:
            name: "{{ codex_npm_name }}"
            version: "{{ codex_npm_version }}"
            global: true
            state: latest
          environment: "{{ paperclip_npm_env }}"
      rescue:
        - name: Clean Paperclip npm directory after update failure
          ansible.builtin.file:
            path: "{{ paperclip_npm_root.stdout }}/paperclipai"
            state: absent

        - name: Retry Paperclip update via npm
          community.general.npm:
            name: "{{ paperclip_npm_name }}"
            version: "{{ paperclip_npm_version }}"
            global: true
            state: latest
          environment: "{{ paperclip_npm_env }}"

        - name: Retry Codex update via npm
          community.general.npm:
            name: "{{ codex_npm_name }}"
            version: "{{ codex_npm_version }}"
            global: true
            state: latest
          environment: "{{ paperclip_npm_env }}"

    - name: Run Paperclip doctor with repair
      ansible.builtin.command: paperclipai doctor --repair
      become_user: "{{ paperclip_user }}"

    - name: Restart Paperclip service
      ansible.builtin.systemd:
        name: "{{ paperclip_service_name }}"
        state: restarted
        scope: user
        daemon_reload: true
      become_user: "{{ paperclip_user }}"
