---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - clang
      - cmake
      - curl
      - ffmpeg
      - fzf
      - git
      - gh
      - gnupg
      - jq
      - kubectx
      - libglu1-mesa
      - ninja-build
      - pkg-config
      - ripgrep
      - unzip
      - xz-utils
      - zip
      - zsh
    state: present
    update_cache: true

- name: Download NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /usr/share/keyrings/nodesource.gpg.key
    mode: "0644"

- name: Dearmor NodeSource GPG key
  ansible.builtin.command: >-
    gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /usr/share/keyrings/nodesource.gpg.key
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: Add NodeSource repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }} nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent
    purge: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker repository parameters
  ansible.builtin.set_fact:
    paperclip_docker_repo_os: "{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' if ansible_distribution == 'Debian' else '' }}"

- name: Ensure Docker repository OS is supported
  ansible.builtin.assert:
    that:
      - paperclip_docker_repo_os | length > 0
    fail_msg: "Unsupported distribution for Docker apt repository: {{ ansible_distribution }}"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ paperclip_docker_repo_os }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ paperclip_docker_repo_os }} {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker Engine packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Ensure Paperclip group exists
  ansible.builtin.group:
    name: "{{ paperclip_group }}"
    state: present

- name: Ensure Paperclip user exists
  ansible.builtin.user:
    name: "{{ paperclip_user }}"
    group: "{{ paperclip_group }}"
    groups: docker
    append: true
    shell: /bin/bash
    create_home: true

- name: Set Kubernetes binary architecture
  ansible.builtin.set_fact:
    paperclip_binary_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else '' }}"

- name: Set Flutter binary architecture
  ansible.builtin.set_fact:
    paperclip_flutter_arch: "{{ 'x64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else '' }}"

- name: Ensure Kubernetes binary architecture is supported
  ansible.builtin.assert:
    that:
      - paperclip_binary_arch | length > 0
    fail_msg: "Unsupported architecture for kubectl/kind/kustomize install: {{ ansible_architecture }}"

- name: Ensure Flutter binary architecture is supported
  ansible.builtin.assert:
    that:
      - paperclip_flutter_arch | length > 0
    fail_msg: "Unsupported architecture for Flutter install: {{ ansible_architecture }}"

- name: Install kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ paperclip_kubectl_version }}/bin/linux/{{ paperclip_binary_arch }}/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Install kind
  ansible.builtin.get_url:
    url: "https://kind.sigs.k8s.io/dl/{{ paperclip_kind_version }}/kind-linux-{{ paperclip_binary_arch }}"
    dest: /usr/local/bin/kind
    mode: "0755"

- name: Install kustomize
  ansible.builtin.unarchive:
    src: "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F{{ paperclip_kustomize_version }}/kustomize_{{ paperclip_kustomize_version }}_linux_{{ paperclip_binary_arch }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"

- name: Set uv binary architecture
  ansible.builtin.set_fact:
    paperclip_uv_arch: "{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' if ansible_architecture == 'aarch64' else '' }}"

- name: Ensure uv binary architecture is supported
  ansible.builtin.assert:
    that:
      - paperclip_uv_arch | length > 0
    fail_msg: "Unsupported architecture for uv install: {{ ansible_architecture }}"

- name: Install uv
  ansible.builtin.unarchive:
    src: "https://github.com/astral-sh/uv/releases/download/{{ paperclip_uv_version }}/uv-{{ paperclip_uv_version }}-{{ paperclip_uv_arch }}-unknown-linux-gnu.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"
    extra_opts:
      - --strip-components=2
  args:
    creates: /usr/local/bin/uv

- name: Ensure Flutter install directory exists
  ansible.builtin.file:
    path: /opt/flutter
    state: directory
    mode: "0755"

- name: Read installed Flutter version marker
  ansible.builtin.slurp:
    src: /opt/flutter/.paperclip_flutter_version
  register: paperclip_flutter_version_marker
  failed_when: false

- name: Remove Flutter SDK when version changes
  ansible.builtin.file:
    path: /opt/flutter
    state: absent
  when: >-
    paperclip_flutter_version_marker.content is defined and
    (paperclip_flutter_version_marker.content | b64decode | trim) != paperclip_flutter_version

- name: Fetch Flutter Linux release index
  ansible.builtin.uri:
    url: https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json
    return_content: true
  register: paperclip_flutter_releases

- name: Select Flutter release archive
  ansible.builtin.set_fact:
    paperclip_flutter_release: >-
      {{
        (
          paperclip_flutter_releases.json.releases
          | selectattr('channel', 'equalto', 'stable')
          | selectattr('version', 'equalto', paperclip_flutter_version)
          | selectattr('dart_sdk_arch', 'equalto', paperclip_flutter_arch)
          | list
          | first
        )
      }}

- name: Ensure requested Flutter release exists
  ansible.builtin.assert:
    that:
      - paperclip_flutter_release is mapping
      - paperclip_flutter_release.archive is defined
    fail_msg: >-
      Flutter {{ paperclip_flutter_version }} for linux/{{ paperclip_flutter_arch }} was not found in the official release index.

- name: Install Flutter SDK
  ansible.builtin.unarchive:
    src: "{{ paperclip_flutter_releases.json.base_url }}/{{ paperclip_flutter_release.archive }}"
    dest: /opt
    remote_src: true
    owner: root
    group: root
    creates: /opt/flutter/bin/flutter

- name: Ensure Flutter SDK version marker is current
  ansible.builtin.copy:
    dest: /opt/flutter/.paperclip_flutter_version
    content: "{{ paperclip_flutter_version }}\n"
    mode: "0644"

- name: Install Flutter CLI symlink
  ansible.builtin.file:
    src: /opt/flutter/bin/flutter
    dest: /usr/local/bin/flutter
    state: link

- name: Install Dart CLI symlink
  ansible.builtin.file:
    src: /opt/flutter/bin/dart
    dest: /usr/local/bin/dart
    state: link

- name: Install SSH authorized keys for Paperclip user
  ansible.builtin.authorized_key:
    user: "{{ paperclip_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ paperclip_authorized_keys }}"

- name: Configure git user name for Paperclip
  ansible.builtin.git_config:
    name: user.name
    scope: global
    value: "{{ paperclip_git_user_name }}"
  become_user: "{{ paperclip_user }}"

- name: Configure git user email for Paperclip
  ansible.builtin.git_config:
    name: user.email
    scope: global
    value: "{{ paperclip_git_user_email }}"
  become_user: "{{ paperclip_user }}"

- name: Install Paperclip and Codex CLIs via npm
  block:
    - name: Get npm global root
      ansible.builtin.command: npm root -g
      register: paperclip_npm_root
      changed_when: false

    - name: Check if Paperclip CLI is installed
      ansible.builtin.command: which paperclipai
      register: paperclip_binary
      changed_when: false
      failed_when: false

    - name: Check if Codex CLI is installed
      ansible.builtin.command: which codex
      register: codex_binary
      changed_when: false
      failed_when: false

    - name: Check if opencode CLI is installed
      ansible.builtin.command: which opencode
      register: opencode_binary
      changed_when: false
      failed_when: false

    - name: Check if pi-agent CLI is installed
      ansible.builtin.command: which pi-agent
      register: pi_agent_binary
      changed_when: false
      failed_when: false

    - name: Remove existing Paperclip install when forced
      ansible.builtin.file:
        path: "{{ paperclip_npm_root.stdout }}/paperclipai"
        state: absent
      when: paperclip_force_reinstall

    - name: Install Paperclip CLI via npm
      community.general.npm:
        name: "{{ paperclip_npm_name }}"
        version: "{{ paperclip_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"
      when: paperclip_binary.rc != 0 or paperclip_force_reinstall

    - name: Install Codex CLI via npm
      community.general.npm:
        name: "{{ codex_npm_name }}"
        version: "{{ codex_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"
      when: codex_binary.rc != 0 or paperclip_force_reinstall

    - name: Install opencode CLI via npm
      community.general.npm:
        name: "{{ opencode_npm_name }}"
        version: "{{ opencode_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"
      when: opencode_binary.rc != 0 or paperclip_force_reinstall

    - name: Install pi-agent via npm
      community.general.npm:
        name: "{{ pi_agent_npm_name }}"
        version: "{{ pi_agent_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"
      when: pi_agent_binary.rc != 0 or paperclip_force_reinstall

    - name: Resolve Paperclip CLI binary path
      ansible.builtin.command: which paperclipai
      register: paperclip_binary_path
      changed_when: false
  rescue:
    - name: Clean Paperclip npm directory after failure
      ansible.builtin.file:
        path: "{{ paperclip_npm_root.stdout }}/paperclipai"
        state: absent

    - name: Retry Paperclip CLI install via npm
      community.general.npm:
        name: "{{ paperclip_npm_name }}"
        version: "{{ paperclip_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"

    - name: Retry Codex CLI install via npm
      community.general.npm:
        name: "{{ codex_npm_name }}"
        version: "{{ codex_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"

    - name: Retry opencode CLI install via npm
      community.general.npm:
        name: "{{ opencode_npm_name }}"
        version: "{{ opencode_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"

    - name: Retry pi-agent install via npm
      community.general.npm:
        name: "{{ pi_agent_npm_name }}"
        version: "{{ pi_agent_npm_version }}"
        global: true
        state: present
      environment: "{{ paperclip_npm_env }}"

    - name: Resolve Paperclip CLI binary path after retry
      ansible.builtin.command: which paperclipai
      register: paperclip_binary_path
      changed_when: false

- name: Enable lingering for Paperclip user services
  ansible.builtin.command: "loginctl enable-linger {{ paperclip_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ paperclip_user }}"

- name: Ensure Paperclip user systemd directory exists
  ansible.builtin.file:
    path: "/home/{{ paperclip_user }}/.config/systemd/user"
    state: directory
    owner: "{{ paperclip_user }}"
    group: "{{ paperclip_group }}"
    mode: "0755"

- name: Install Paperclip systemd unit
  ansible.builtin.template:
    src: paperclip.service.j2
    dest: "/home/{{ paperclip_user }}/.config/systemd/user/{{ paperclip_service_name }}.service"
    owner: "{{ paperclip_user }}"
    group: "{{ paperclip_group }}"
    mode: "0644"

- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Install Certbot and Cloudflare plugin
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-dns-cloudflare
    state: present

- name: Ensure Cloudflare token and email are set
  ansible.builtin.assert:
    that:
      - cloudflare_api_token | length > 0
      - letsencrypt_email | length > 0
    fail_msg: "CLOUDFLARE_API_TOKEN and LETSENCRYPT_EMAIL must be set in the environment."

- name: Install Cloudflare credentials for Certbot
  ansible.builtin.template:
    src: cloudflare.ini.j2
    dest: /etc/letsencrypt/cloudflare.ini
    owner: root
    group: root
    mode: "0600"

- name: Obtain Let's Encrypt certificate via DNS challenge
  ansible.builtin.command: >-
    certbot certonly
    --dns-cloudflare
    --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
    --non-interactive
    --agree-tos
    -m {{ letsencrypt_email }}
    -d {{ paperclip_cert_domain }}
  args:
    creates: "/etc/letsencrypt/live/{{ paperclip_cert_domain }}/fullchain.pem"

- name: Install Certbot deploy hook to reload Nginx
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
    mode: "0755"
    owner: root
    group: root
    content: |-
      #!/usr/bin/env bash
      set -e
      systemctl reload nginx

- name: Configure Nginx for Paperclip UI
  ansible.builtin.template:
    src: paperclip-nginx.conf.j2
    dest: /etc/nginx/sites-available/paperclip.conf
    mode: "0644"
  notify: Reload Nginx

- name: Enable Paperclip Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/paperclip.conf
    dest: /etc/nginx/sites-enabled/paperclip.conf
    state: link
  notify: Reload Nginx

- name: Ensure Nginx is running
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Print manual Paperclip onboarding steps
  ansible.builtin.debug:
    msg:
      - "Paperclip, Codex, opencode, pi-agent, Docker, kubectl, kind, gh, jq, rg, uv, and Hermes prerequisites are installed. Run onboarding manually before starting the service:"
      - "sudo -i -u {{ paperclip_user }}"
      - "docker info"
      - "codex --login"
      - "curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash"
      - "source ~/.bashrc  # or ~/.zshrc"
      - "hermes version"
      - "paperclipai onboard"
      - "systemctl --user daemon-reload"
      - "systemctl --user enable --now {{ paperclip_service_name }}"
