---
- name: Windrose Backup Operations
  hosts: windrose_servers
  become: true
  vars_files:
    - ../inventory/vault.yml
  vars_prompt:
    - name: backup_operation
      prompt: "Choose backup operation (setup|backup|restore|list)"
      default: "backup"
      private: false

  tasks:
    - name: Verify backup is enabled
      ansible.builtin.fail:
        msg: "Backup is not enabled. Set backup_enabled: true in group_vars"
      when: not backup_enabled | default(false)

    - name: Setup backup
      block:
        - name: Include backup setup tasks
          ansible.builtin.include_role:
            name: windrose
            tasks_from: backup
      when: backup_operation == "setup"

    - name: Perform manual backup
      block:
        - name: Run backup service
          ansible.builtin.systemd:
            name: backup-windrose.service
            state: started

        - name: Show backup logs
          ansible.builtin.command:
            cmd: journalctl -u backup-windrose.service --since="5 minutes ago" --no-pager
          register: backup_logs
          changed_when: false

        - name: Display backup results
          ansible.builtin.debug:
            var: backup_logs.stdout_lines
      when: backup_operation == "backup"

    - name: List backup snapshots
      block:
        - name: List restic snapshots
          ansible.builtin.shell: |
            source /etc/restic-env
            restic snapshots
          args:
            executable: /bin/bash
          register: snapshots
          become_user: "{{ windrose_user }}"
          changed_when: false

        - name: Display snapshots
          ansible.builtin.debug:
            var: snapshots.stdout_lines
      when: backup_operation == "list"

    - name: Restore from backup
      block:
        - name: Get available snapshots
          ansible.builtin.shell: |
            source /etc/restic-env
            restic snapshots --json
          args:
            executable: /bin/bash
          register: snapshots_json
          become_user: "{{ windrose_user }}"
          changed_when: false

        - name: Parse snapshots
          ansible.builtin.set_fact:
            snapshots_list: "{{ snapshots_json.stdout | from_json }}"

        - name: Display available snapshots
          ansible.builtin.debug:
            msg: "Snapshot {{ item.short_id }}: {{ item.time }} - {{ item.paths | join(', ') }}"
          loop: "{{ snapshots_list }}"
          when: snapshots_list | length > 0

        - name: Prompt for snapshot ID
          ansible.builtin.pause:
            prompt: "Enter the snapshot ID to restore from (or 'latest' for most recent)"
          register: snapshot_choice

        - name: Stop Windrose server before restore
          ansible.builtin.command:
            cmd: ./windrose stop
            chdir: "{{ windrose_project_dir }}"
          become_user: "{{ windrose_user }}"

        - name: Create backup of current configured paths
          ansible.builtin.shell: |
            set -e
            if [ -e "{{ item }}" ]; then
                cp -a "{{ item }}" "{{ item }}.backup.{{ ansible_date_time.epoch }}"
            fi
          args:
            executable: /bin/bash
          loop: "{{ backup_paths }}"

        - name: Restore from snapshot
          ansible.builtin.shell: |
            set -e
            source /etc/restic-env
            rm -rf /tmp/windrose-restore
            {% if snapshot_choice.user_input == 'latest' %}
            restic restore latest --target /tmp/windrose-restore
            {% else %}
            restic restore {{ snapshot_choice.user_input }} --target /tmp/windrose-restore
            {% endif %}
            if [ -e "/tmp/windrose-restore{{ item }}" ]; then
                rm -rf "{{ item }}"
                mkdir -p "$(dirname '{{ item }}')"
                cp -a "/tmp/windrose-restore{{ item }}" "{{ item }}"
            else
                echo "ERROR: Restored snapshot does not contain {{ item }}"
                exit 1
            fi
          args:
            executable: /bin/bash
          loop: "{{ backup_paths }}"
          become_user: "{{ windrose_user }}"

        - name: Remove temporary restore directory
          ansible.builtin.file:
            path: /tmp/windrose-restore
            state: absent
          become_user: "{{ windrose_user }}"

        - name: Start Windrose server after restore
          ansible.builtin.command:
            cmd: ./windrose start
            chdir: "{{ windrose_project_dir }}"
          become_user: "{{ windrose_user }}"

        - name: Display restore completion
          ansible.builtin.debug:
            msg:
              - "Restore completed successfully."
              - "Original paths backed up with suffix: .backup.{{ ansible_date_time.epoch }}"
              - "Windrose compose project has been restarted."
      when: backup_operation == "restore"
