---
- name: Ensure Windrose project directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ windrose_user }}"
    group: "{{ windrose_group }}"
    mode: "0755"
  loop:
    - "{{ windrose_project_dir }}"
    - "{{ windrose_project_dir }}/data"
    - "{{ windrose_project_dir }}/steam-home"
    - "{{ windrose_project_dir }}/{{ windrose_backup_dir }}"

- name: Create Windrose environment file
  ansible.builtin.template:
    src: windrose.env.j2
    dest: "{{ windrose_project_dir }}/.env"
    owner: "{{ windrose_user }}"
    group: "{{ windrose_group }}"
    mode: "0600"
  notify: restart windrose

- name: Create Windrose docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ windrose_project_dir }}/docker-compose.yml"
    owner: "{{ windrose_user }}"
    group: "{{ windrose_group }}"
    mode: "0644"
  notify: restart windrose

- name: Pull Windrose image
  community.docker.docker_compose_v2_pull:
    project_src: "{{ windrose_project_dir }}"

- name: Start Windrose compose project
  community.docker.docker_compose_v2:
    project_src: "{{ windrose_project_dir }}"
    state: present

- name: Display Windrose startup information
  ansible.builtin.debug:
    msg: |
      Windrose is managed from {{ windrose_project_dir }}.
      View logs with:
        sudo docker compose --project-directory {{ windrose_project_dir }} logs -f windrose

      Players normally join using the invite code in:
        {{ windrose_project_dir }}/data/R5/ServerDescription.json
