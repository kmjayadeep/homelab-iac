---
- name: Ensure Windrose project directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ windrose_user }}"
    group: "{{ windrose_group }}"
    mode: "0755"
  loop:
    - "{{ windrose_project_dir }}"
    - "{{ windrose_project_dir }}/data"
    - "{{ windrose_project_dir }}/steam-home"
    - "{{ windrose_project_dir }}/{{ windrose_backup_dir }}"

- name: Create Windrose environment file
  ansible.builtin.template:
    src: windrose.env.j2
    dest: "{{ windrose_project_dir }}/.env"
    owner: "{{ windrose_user }}"
    group: "{{ windrose_group }}"
    mode: "0600"
  notify: restart windrose

- name: Create Windrose docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ windrose_project_dir }}/docker-compose.yml"
    owner: "{{ windrose_user }}"
    group: "{{ windrose_group }}"
    mode: "0644"
  notify: restart windrose

- name: Install Windrose helper CLI scripts
  ansible.builtin.get_url:
    url: "{{ windrose_helper_repository_raw_url }}/{{ windrose_helper_ref }}/{{ item }}"
    dest: "{{ windrose_project_dir }}/{{ item }}"
    owner: "{{ windrose_user }}"
    group: "{{ windrose_group }}"
    mode: "0755"
  loop: "{{ windrose_helper_scripts }}"

- name: Start Windrose server with helper CLI
  ansible.builtin.command:
    cmd: ./windrose start
    chdir: "{{ windrose_project_dir }}"
  become_user: "{{ windrose_user }}"

- name: Display Windrose startup information
  ansible.builtin.debug:
    msg: |
      Windrose is managed from {{ windrose_project_dir }}.
      View logs with:
        cd {{ windrose_project_dir }} && ./windrose logs

      Check status with:
        cd {{ windrose_project_dir }} && ./windrose status

      Players normally join using the invite code in:
        {{ windrose_project_dir }}/data/R5/ServerDescription.json
